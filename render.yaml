services:
  - type: web
    name: shadow-ai-detector
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn presidio_scanner:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.12"
    autoDeploy: true
